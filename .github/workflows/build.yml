name: build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  docker-build:
    name: build (${{ matrix.image.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: backend
            dockerfile: .semiont/containers/Dockerfile.backend
          - name: worker
            dockerfile: .semiont/containers/Dockerfile.worker
          - name: smelter
            dockerfile: .semiont/containers/Dockerfile.smelter
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.image.name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image.name }}
